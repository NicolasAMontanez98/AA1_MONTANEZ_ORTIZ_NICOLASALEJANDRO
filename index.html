<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MovieActivity - Reseña tus películas favoritas</title>
    <link rel="icon" href="./assets/logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body class="bg-white">
    <nav class="navbar navbar-dark bg-dark bg-gradient">
        <div class="container">
            <span class="navbar-brand fw-bold fs-4">🎥 MovieActivity</span>
            <button class="theme-toggle-btn btn btn-outline-light btn-sm" id="themeToggle">🌙 Oscuro</button>
        </div>
    </nav>
    <!-- Alerta de error que se muestra en caso de fallo al consultar la información -->
    <div id="errorAlert" class="alert alert-danger alert-dismissible mx-3 mt-3 d-none" role="alert"></div>
    <!-- Barra de búsqueda y filtros -->
    <div class="bg-dark pb-4 pt-3 search-section">
        <div class="container">
            <form id="searchForm" class="mb-3">
                <div class="input-group">
                    <input type="text" class="form-control form-control-lg" id="searchInput" placeholder="Buscar películas...">
                    <button class="btn btn-warning fw-bold" type="submit">Buscar</button>
                </div>
            </form>
            <div class="row g-2">
                <div class="col-12 col-sm-6 col-md-3">
                    <select class="form-select" id="genreFilter">
                        <option value="">Todos los géneros</option>
                    </select>
                </div>
                <div class="col-12 col-sm-6 col-md-2">
                    <input type="number" class="form-control" id="yearFilter" placeholder="Año" min="1900" max="2026">
                </div>
                <div class="col-12 col-sm-6 col-md-4">
                    <select class="form-select" id="sortFilter">
                        <option value="release_date.desc">Más recientes</option>
                        <option value="release_date.asc">Más antiguas</option>
                        <option value="popularity.desc">Más populares</option>
                        <option value="vote_average.desc">Mejor valoradas</option>
                    </select>
                </div>
                <div class="col-12 col-sm-6 col-md-3">
                    <button class="btn btn-outline-light w-100" id="clearFilters">&#10005; Limpiar filtros</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Contenido principal -->
    <div class="container mt-4">
        <!-- Pestañas -->
        <ul class="nav nav-pills mb-4">
            <li class="nav-item">
                <button class="nav-link active fw-bold text-black" id="allMoviesBtn">Todas las películas</button>
            </li>
            <li class="nav-item">
                <button class="nav-link fw-bold text-black" id="favoritesBtn">&#9829; Mis favoritas</button>
            </li>
        </ul>
        <!-- Principal para consulta de películas -->
        <div id="moviesSection">
            <div id="loadingSpinner" class="text-center py-5 d-none">
                <div class="spinner-border text-dark" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="text-muted mt-2">Cargando películas...</p>
            </div>
            <div class="row" id="moviesGrid"></div>
            <div class="text-center mt-2 mb-5">
                <button class="btn btn-dark px-5 d-none" id="loadMoreBtn">Ver más películas</button>
            </div>
        </div>
        <!-- Vista de peliculas favoritas -->
        <div id="favoritesSection" class="d-none">
            <h5 class="mb-4 text-muted">&#9829; Mis películas favoritas</h5>
            <div class="row" id="favoritesGrid"></div>
        </div>

    </div>

    <!-- Creditos y fuente de datos -->
    <footer class="bg-dark text-center text-white py-3 mt-5">
        <small>MovieActivity &mdash; Datos tomados de <a href="https://www.themoviedb.org" class="text-warning text-decoration-none" target="_blank">The Movie Database</a></small>
        <br/>
        <small>Página web creada usando <a href="https://getbootstrap.com/" class="text-danger text-decoration-none" target="_blank">Bootstrap</a></small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./js/api.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/theme.js"></script>
</body>

</html>
